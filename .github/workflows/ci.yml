name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Check formatting
        if: runner.os == 'Linux'
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Run vet
        if: runner.os == 'Linux'
        run: go vet ./...

      - name: Build CLI
        run: |
          suffix=""
          if [ "$RUNNER_OS" = "Windows" ]; then
            suffix=".exe"
          fi
          go build -o "$RUNNER_TEMP/gtk$suffix" ./cmd/gtk
